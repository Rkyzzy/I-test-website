name: Deploy to GitHub Pages

on:
  push:
    branches-ignore:
      - "gh-pages"

concurrency:
  group: "pages-deploy-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set deployment paths
        id: paths
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SAFE_BRANCH="$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')"
          if [ "$BRANCH" = "main" ]; then
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "dest=." >> "$GITHUB_OUTPUT"
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          else
            echo "base=/preview/$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
            echo "dest=preview/$SAFE_BRANCH" >> "$GITHUB_OUTPUT"
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Branch: $BRANCH | Base: ${{ steps.paths.outputs.base }} | Dest: ${{ steps.paths.outputs.dest }}"

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.paths.outputs.base }}

      - name: Copy 404 fallback for preview
        if: steps.paths.outputs.is_preview == 'true'
        run: |
          cat > out/404.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=./"></head><body></body></html>
          EOF
          echo "Preview 404 fallback created"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out
          destination_dir: ${{ steps.paths.outputs.dest }}
          keep_files: true
          cname: rkyzzy.xyz
