<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = location.pathname;
    var previewMatch = path.match(/^\/I-test-website\/preview\/([^\/]+)/);
    if (previewMatch) {
      var previewDir = previewMatch[0];
      sessionStorage.setItem('redirect', path);
      location.replace(previewDir + '/index.html');
    } else {
      sessionStorage.setItem('redirect', path);
      location.replace('/I-test-website/');
    }
  </script>
</head>
<body></body>
</html>
