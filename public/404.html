<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // SPA fallback for GitHub Pages
      // Redirect all 404s to the main index.html, Vue Router will handle the routing
      window.location.href = '/I-test-website/' + window.location.pathname.slice('/I-test-website'.length) + window.location.search + window.location.hash;
    </script>
  </head>
  <body>
    <p>Redirecting to the homepage...</p>
  </body>
</html>
