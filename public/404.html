<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = location.pathname;
    var previewMatch = path.match(/^\/preview\/([^\/]+)/);
    if (previewMatch) {
      var previewDir = previewMatch[0];
      sessionStorage.setItem('redirect', path);
      location.replace(previewDir + '/index.html');
    } else {
      location.replace('/?redirect=' + encodeURIComponent(path));
    }
  </script>
</head>
<body></body>
</html>
